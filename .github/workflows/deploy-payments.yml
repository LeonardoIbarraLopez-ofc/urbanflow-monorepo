# deploy-payments.yml — CI/CD para unified-payment-ms (NestJS/TypeScript).
# Ejecuta linter, tests y despliega en Render al hacer push a main.

name: Deploy Unified Payment MS

on:
  push:
    branches: [main]
    paths:
      - "services/unified-payment-ms/**"

jobs:
  test-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: services/unified-payment-ms/package.json

      - name: Install dependencies
        working-directory: services/unified-payment-ms
        run: npm ci

      - name: Lint
        working-directory: services/unified-payment-ms
        run: npm run lint

      - name: Run tests
        working-directory: services/unified-payment-ms
        run: npm run test

      - name: Build
        working-directory: services/unified-payment-ms
        run: npm run build

      - name: Deploy to Render
        run: curl -X POST ${{ secrets.RENDER_DEPLOY_HOOK_PAYMENTS }}
